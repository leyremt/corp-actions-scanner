name: scan

on:
  schedule:
    - cron: "0 6 * * 1-5"   # weekdays 06:00 UTC
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write              # allow the job to commit docs/data.json

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          SEC_CONTACT: ${{ secrets.SEC_CONTACT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # LLM fallback extraction (Haiku)
        run: python -m scanner.build 30 365   # SEC window 30d, BaFin window 365d

      - name: Commit results
        run: |
          git config user.name "corp-actions-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "scan: update data.json ($(date -u +%FT%TZ))"
            # The remote may have advanced during the run (another push). Rebase
            # our data.json commit on top and retry; -X theirs keeps our freshly
            # generated file if it ever conflicts.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "pushed"; break
              fi
              echo "push rejected, rebasing and retrying ($attempt)…"
              git fetch origin main && git rebase -X theirs origin/main
              sleep 3
            done
          fi
