name: scan

on:
  schedule:
    - cron: "0 6 * * 1-5"   # weekdays 06:00 UTC
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write              # allow the job to commit docs/data.json

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scanner
        run: python -m scanner.build 30

      - name: Commit results
        run: |
          git config user.name "corp-actions-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "scan: update data.json ($(date -u +%FT%TZ))"
            git push
          fi
