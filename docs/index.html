<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corporate Actions Scanner</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --green:#3fb950; --red:#f85149; --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text)}
  header{padding:20px 24px;border-bottom:1px solid var(--border)}
  h1{margin:0;font-size:18px;font-weight:600}
  .meta{color:var(--muted);font-size:12px;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px;align-items:center}
  .controls input,.controls select{background:var(--panel);border:1px solid var(--border);
       color:var(--text);border-radius:6px;padding:6px 10px;font-size:13px}
  .controls input{flex:1;min-width:160px}
  .pill{color:var(--muted);font-size:12px;margin-left:auto}
  .wrap{overflow-x:auto;padding:0 24px 40px}
  table{border-collapse:collapse;width:100%;min-width:920px}
  th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;
     cursor:pointer;user-select:none;position:sticky;top:0;background:var(--bg)}
  th:hover{color:var(--text)}
  td.issuer{white-space:normal;max-width:300px}
  .bidder{color:var(--muted);font-size:12px}
  .tk{font-weight:600}
  .isin{font-weight:400;color:var(--muted);font-size:12px}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .pos{color:var(--green)} .neg{color:var(--red)} .dim{color:var(--muted)}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border)}
  .src{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600}
  .src.SEC{background:#1f6feb33;color:#79c0ff} .src.BaFin{background:#bb800933;color:#e3b341}
  .src.Buyback{background:#8957e533;color:#d2a8ff}
  .src.Squeeze{background:#da363333;color:#ff9e9e}
  .tag.oddlot{background:#3fb95022;color:#3fb950;border-color:#3fb95066;font-weight:600}
  .new{font-size:11px}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .empty{padding:40px 24px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>📡 Corporate Actions Scanner</h1>
  <div class="meta" id="meta">cargando…</div>
</header>

<div class="controls">
  <input id="q" placeholder="Buscar emisor, bidder o ticker…">
  <select id="src">
    <option value="">Todas las fuentes</option>
    <option value="SEC">SEC (US)</option>
    <option value="BaFin">BaFin (DE)</option>
    <option value="DE-Buyback">Recompras (DE)</option>
    <option value="DE-SqueezeOut">Squeeze-outs (DE)</option>
  </select>
  <select id="cat">
    <option value="">Todas las categorías</option>
    <option value="tender">Tender / ofertas</option>
    <option value="going_private">Going-private</option>
    <option value="delisting">Delistings</option>
    <option value="squeeze_out">Squeeze-outs</option>
  </select>
  <label class="dim" style="font-size:13px"><input type="checkbox" id="onlyspread"> solo con spread</label>
  <label class="dim" style="font-size:13px"><input type="checkbox" id="hideexpired" checked> ocultar vencidas</label>
  <label class="dim" style="font-size:13px"><input type="checkbox" id="hidefunds" checked> ocultar fondos</label>
  <span class="pill" id="count"></span>
</div>

<div class="wrap">
  <table>
    <thead><tr>
      <th data-k="source">Fuente</th>
      <th data-k="spread_pct" class="num">Spread %</th>
      <th data-k="ticker">Ticker / ISIN</th>
      <th data-k="issuer">Emisor</th>
      <th data-k="event_type">Evento</th>
      <th data-k="offer_price" class="num">Oferta</th>
      <th data-k="current_price" class="num">Actual</th>
      <th data-k="announce_date">Anuncio</th>
      <th data-k="exec_date">Ejecución</th>
      <th>Doc</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" hidden>Sin resultados.</div>
</div>

<script>
let DATA = [], sortK = "spread_pct", sortDir = -1;
const $ = s => document.querySelector(s);
const fmt = (v, d=2) => v == null ? "—" : Number(v).toFixed(d);
const cur = e => e.source === "SEC" ? "$" : "€";
const srcClass = e => e.source === "SEC" ? "SEC" : (e.source === "BaFin" ? "BaFin" :
  (e.source === "DE-SqueezeOut" ? "Squeeze" : "Buyback"));
const TAGS = {tender:"#3fb95033", going_private:"#d2992233", delisting:"#f8514933", squeeze_out:"#f8514955"};
const TODAY = new Date().toISOString().slice(0,10);
// "New" = first seen by the scanner within the last 2 days.
const isNew = e => e.first_seen && (new Date(TODAY) - new Date(e.first_seen)) <= 2*864e5;
const BUYBACK_WINDOW = 28;  // days: typical German buyback acceptance window (estimate)
function addDays(iso, n){ const d = new Date(iso+"T00:00:00Z"); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
// When exec_date is known, use it. For buybacks (no reliable end date) estimate
// the close ~4 weeks after announcement so closed ones stop cluttering the view.
function expiry(e){
  if(e.exec_date) return {label:e.exec_date, expired:e.exec_date < TODAY, est:false};
  if(e.source === "DE-Buyback" && e.announce_date){
    const est = addDays(e.announce_date, BUYBACK_WINDOW);
    return {label:null, expired: est < TODAY, est:true};
  }
  return {label:null, expired:false, est:false};
}
const isExpired = e => expiry(e).expired;

function render(){
  const q = $("#q").value.trim().toLowerCase();
  const cat = $("#cat").value, src = $("#src").value;
  const onlyspread = $("#onlyspread").checked;
  const hideExpired = $("#hideexpired").checked;
  const hideFunds = $("#hidefunds").checked;
  let rows = DATA.filter(e =>
    (!cat || e.category === cat) &&
    (!src || e.source === src) &&
    (!onlyspread || e.spread_pct != null) &&
    (!hideExpired || !isExpired(e)) &&
    (!hideFunds || !e.is_fund) &&
    (!q || [e.issuer, e.ticker, e.isin, e.bidder].some(x => (x||"").toLowerCase().includes(q)))
  );
  rows.sort((a,b)=>{
    let x=a[sortK], y=b[sortK];
    if(x==null) x = sortDir<0 ? -Infinity : Infinity;
    if(y==null) y = sortDir<0 ? -Infinity : Infinity;
    if(typeof x==="string") return sortDir*x.localeCompare(y);
    return sortDir*(x-y);
  });
  $("#count").textContent = rows.length + " eventos";
  $("#empty").hidden = rows.length>0;
  $("#rows").innerHTML = rows.map(e=>{
    const s = e.spread_pct;
    const x = expiry(e);
    const scls = s==null?"dim":(s>=0?"pos":"neg");
    const sval = s==null?"—":(s>0?"+":"")+fmt(s)+"%";
    const idcell = e.ticker
      ? `<span class="tk">${esc(e.ticker)}</span>`
      : (e.isin ? `<span class="isin">${esc(e.isin)}</span>` : "<span class=dim>—</span>");
    const bidder = e.bidder ? `<div class="bidder">↳ ${esc(e.bidder)}</div>` : "";
    return `<tr>
      <td><span class="src ${srcClass(e)}">${esc(e.source)}</span></td>
      <td class="num ${scls}">${sval}</td>
      <td>${idcell}</td>
      <td class="issuer">${isNew(e)?'<span class="new">🆕</span> ':''}${esc(e.issuer)}${bidder}</td>
      <td><span class="tag" style="background:${TAGS[e.category]||''}">${esc(e.event_type)}</span>${e.odd_lot?' <span class="tag oddlot">ODD-LOT</span>':''}</td>
      <td class="num">${e.offer_price==null?'<span class=dim>—</span>':cur(e)+fmt(e.offer_price)}</td>
      <td class="num">${e.current_price==null?'<span class=dim>—</span>':cur(e)+fmt(e.current_price)}</td>
      <td class="dim">${e.announce_date||"—"}</td>
      <td class="${x.expired?'neg':'dim'}">${x.label ? x.label+(x.expired?' · vencida':'') : (x.expired?'~cerrada':'—')}</td>
      <td><a href="${e.url}" target="_blank" rel="noopener">ver ↗</a></td>
    </tr>`;
  }).join("");
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

document.querySelectorAll("th[data-k]").forEach(th=>{
  th.onclick=()=>{const k=th.dataset.k; sortDir = (k===sortK)?-sortDir:-1; sortK=k; render();};
});
["q","cat","src","onlyspread","hideexpired","hidefunds"].forEach(id=>$("#"+id).addEventListener("input",render));

fetch("data.json?_="+Date.now()).then(r=>r.json()).then(d=>{
  DATA = d.events||[];
  const dt = new Date(d.generated_at);
  const w = d.window_days || {};
  const wtxt = typeof w === "object" ? `SEC ${w.SEC}d · BaFin ${w.BaFin}d` : `${w}d`;
  $("#meta").textContent =
    `${d.count} eventos · ${(d.sources||[]).join(" + ")} · ventana ${wtxt} · actualizado ${dt.toLocaleString("es-ES")}`;
  render();
}).catch(e=>{$("#meta").textContent="No se pudo cargar data.json — "+e;});
</script>
</body>
</html>
